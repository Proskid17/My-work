<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agumba limited.ng | Construction Supplies</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #004a99;
            font-size: 2.5em;
            margin-bottom: 40px;
            border-bottom: 3px solid #004a99;
            display: inline-block;
            padding-bottom: 10px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 20px;
            width: 280px;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-bottom: 1px solid #eee;
            margin-bottom: 15px;
        }

        .price {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
            margin: 15px 0;
            display: block;
        }

        .buy-btn {
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            text-decoration: none;
            padding: 12px 0;
            display: block;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            transition: background-color 0.3s;
        }

        .buy-btn:hover {
            background-color: #128C7E;
        }

        @media (max-width: 600px) {
            .product-card { width: 90%; }
        }
    </style>
</head>
<body>

    <h1>Agumba limited.ng</h1>

    <div class="container">
        <div class="product-card">
            <img src="rebar.png" alt="Steel Rebar">
            <span class="price">₦12,000</span>
            <a href="https://wa.me/2348033405273?text=Hello,%20I%20want%20to%20buy%20Steel%20Rebar%20for%20₦12,000" class="buy-btn">BUY</a>
        </div>

        <div class="product-card">
            <img src="wire.png" alt="Galvanized Wire">
            <span class="price">₦32,000</span>
            <a href="https://wa.me/2348033405273?text=Hello,%20I%20want%20to%20buy%20Wire%20Coils%20for%20₦32,000" class="buy-btn">BUY</a>
        </div>

        <div class="product-card">
            <img src="cement.png" alt="Dangote Cement">
            <span class="price">₦12,000</span>
            <a href="https://wa.me/2348033405273?text=Hello,%20I%20want%20to%20buy%20Dangote%20Cement%20for%20₦12,000" class="buy-btn">BUY</a>
        </div>
    </div>

</body>
</html>
